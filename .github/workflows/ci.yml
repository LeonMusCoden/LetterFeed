name: CI
on:
  release:
    types: [ published ]
  push:
    branches:
      - master
  pull_request:
    branches: [ "master" ]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh
    - name: Install dependencies
      run: |
        source ~/.cargo/env
        uv sync --group test
    - name: Lint with ruff
      run: |
        uv run ruff check .
    - name: Test with pytest
      run: |
        uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install dependencies
      run: npm install
    - name: Lint with ESLint
      run: npm run lint
    - name: Test with Jest
      run: npm run test

  docker_publish_backend:
    runs-on: ubuntu-latest
    needs: backend
    if: github.event_name == 'release' || github.ref == 'refs/heads/master'

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push ARM images (backend)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/arm64,linux/arm/v7
          tags: |
            ghcr.io/${{ github.actor }}/letterfeed-backend:latest
            ghcr.io/${{ github.actor }}/letterfeed-backend:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.actor }}/letterfeed-backend:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.actor }}/letterfeed-backend:buildcache,mode=max

  docker_publish_frontend:
    runs-on: ubuntu-latest
    needs: frontend
    if: github.event_name == 'release' || github.ref == 'refs/heads/master'

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push ARM images (frontend)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/arm64,linux/arm/v7
          tags: |
            ghcr.io/${{ github.actor }}/letterfeed-frontend:latest
            ghcr.io/${{ github.actor }}/letterfeed-frontend:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.actor }}/letterfeed-frontend:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.actor }}/letterfeed-frontend:buildcache,mode=max

